<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日语单词读音测验</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="setup-panel" aria-labelledby="setup-title">
        <div class="top-bar">
          <div>
            <h1 id="setup-title">日语单词读音测验</h1>
            <p id="subtitle" class="subtitle">每行输入一个词：汉字,平假名读音</p>
          </div>
          <label class="language-select">
            语言
            <select id="language-select">
              <option value="ja" selected>日语</option>
              <option value="en">英语</option>
            </select>
          </label>
        </div>

        <label for="word-list">词表</label>
        <textarea id="word-list" spellcheck="false">経験,けいけん
姿勢,しせい
農園,のうえん
収穫,しゅうかく
巣箱,すばこ
鼠,ねずみ
被害,ひがい
設置,せっち
共同,きょうどう
成功,せいこう</textarea>

        <div class="button-row">
          <button id="start-button" type="button">开始测验</button>
          <button id="restart-button" class="secondary" type="button">重新开始</button>
        </div>

        <section class="folder-panel" aria-labelledby="recent-folder-title">
          <div class="folder-header">
            <h2 id="recent-folder-title">近期错误收藏夹</h2>
            <span id="recent-folder-count">0 个</span>
          </div>
          <div class="button-row compact-row">
            <button id="collect-recent-button" class="secondary" type="button" disabled>
              加入错误 &gt; 3 的词
            </button>
            <button id="start-recent-button" class="secondary" type="button" disabled>
              开始近期错误测验
            </button>
          </div>
          <div id="recent-folder-list" class="folder-list"></div>
        </section>

        <section class="folder-panel" aria-labelledby="vocabulary-title">
          <div class="folder-header">
            <h2 id="vocabulary-title">词汇库</h2>
            <span id="vocabulary-count">0 个</span>
          </div>
          <div class="button-row compact-row">
            <button id="start-selected-vocab-button" class="secondary" type="button" disabled>
              测验选中词
            </button>
          </div>
          <div id="vocabulary-list" class="vocabulary-list"></div>
        </section>

        <p class="privacy-note">错题记录和词汇库只保存在当前浏览器本地，不会上传，也不会被其他用户看到。</p>
        <p id="parse-message" class="message" role="status"></p>
      </section>

      <section class="quiz-panel" aria-labelledby="quiz-title">
        <div class="panel-header">
          <h2 id="quiz-title">当前题目</h2>
          <p id="progress">剩余 0 / 总共 0</p>
        </div>

        <fieldset class="mode-switch" aria-label="测验模式">
          <label>
            <input type="radio" name="quiz-mode" value="kanji" checked />
            看字输入
          </label>
          <label>
            <input type="radio" name="quiz-mode" value="listening" />
            听力听写
          </label>
          <label>
            <input type="radio" name="quiz-mode" value="meaning" />
            听懂判断
          </label>
          <button id="play-audio-button" class="secondary small-button" type="button" disabled>
            播放
          </button>
        </fieldset>

        <div id="question-card" class="question-card">
          <span id="current-word" class="current-word">请先开始测验</span>
        </div>

        <label id="answer-label" for="answer-input">输入平假名读音</label>
        <div class="answer-row">
          <input id="answer-input" type="text" autocomplete="off" disabled />
          <button id="submit-button" type="button" disabled>提交答案</button>
        </div>

        <div id="meaning-actions" class="meaning-actions hidden">
          <button id="heard-meaning-button" type="button" disabled>听出来</button>
          <button id="missed-meaning-button" class="secondary" type="button" disabled>没听出来</button>
        </div>

        <button id="review-button" class="secondary review-button" type="button" disabled>
          复习未通过单词
        </button>

        <div id="feedback" class="feedback neutral" role="status">等待开始</div>

        <section id="result-panel" class="result-panel hidden" aria-labelledby="result-title">
          <h2 id="result-title">全部完成</h2>
          <p id="summary"></p>
          <div id="mistake-list" class="mistake-list"></div>
        </section>
      </section>
    </main>

    <section id="review-modal" class="modal hidden" aria-labelledby="review-title" role="dialog" aria-modal="true">
      <div class="modal-panel">
        <div class="modal-header">
          <h2 id="review-title">复习未通过单词</h2>
          <button id="close-review-button" class="secondary small-button" type="button">关闭</button>
        </div>

        <p id="review-count" class="review-count"></p>
        <div id="review-list" class="review-list"></div>

        <div class="modal-actions">
          <button id="continue-review-button" type="button">继续测验</button>
        </div>
      </div>
    </section>

    <script src="./script.js"></script>
  </body>
</html>
